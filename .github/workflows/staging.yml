name: Deploy staging

on:
  push:
    branches: [cartograph-looks-pass-ab]
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --base=/lafayette-square-staging/
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Push dist to staging repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.STAGING_DEPLOY_KEY }}
          external_repository: jacobeugenehenderson/lafayette-square-staging
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Staging deploy from ${{ github.sha }}"
